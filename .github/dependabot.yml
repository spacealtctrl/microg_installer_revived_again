version: 2
updates:
  - package-ecosystem: npm
    directory: /webui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      webui-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
