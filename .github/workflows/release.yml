name: Release

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if version tag already exists'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'webui/package.json'
      - 'webui/package-lock.json'

concurrency:
  group: release
  cancel-in-progress: false

env:
  MODULE_NAME: 'microg_installer_revived_again'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.setup.outputs.version_changed }}
      VERSION: ${{ steps.setup.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_SYNC_PAT }}

      - name: Bump version
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          CUR=$(grep '^version=' module.prop | cut -d= -f2 | sed 's/^v//; s/-.*//')
          IFS=. read -r MAJOR MINOR PATCH <<< "$CUR"
          if [ "$EVENT_NAME" = "push" ]; then
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          NEW_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          sed -i "s/^version=.*/version=${NEW_VERSION}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${NEW_CODE}/" module.prop
          sed -i -E "s/(\"version\": )\"[^\"]*\"/\1\"${MAJOR}.${MINOR}.${PATCH}\"/" webui/package.json
          echo "module.prop -> version=${NEW_VERSION} versionCode=${NEW_CODE}"

      - name: Update CHANGELOG
        if: github.event_name == 'push'
        run: |
          VER=$(grep '^version=' module.prop | cut -d= -f2)
          ENTRIES=$(git diff HEAD~1 HEAD -- webui/package.json \
            | grep -E '^[+-][[:space:]]*"' \
            | sed -E 's/^([+-])[[:space:]]*"([^"]+)":[[:space:]]*"([^"]+)",?/\1 \2 \3/' \
            | awk '
                $1=="-" { old[$2]=$3 }
                $1=="+" { neu[$2]=$3 }
                END {
                  for (p in neu) {
                    if ((p in old) && old[p]!=neu[p]) print "- Update " p ": " old[p] " -> " neu[p]
                    else if (!(p in old))            print "- Add " p " " neu[p]
                  }
                  for (p in old) if (!(p in neu))    print "- Remove " p
                }' | sort)
          if [ -z "$ENTRIES" ]; then
            ENTRIES="- Maintenance release: dependency updates"
          fi
          COUNT=$(printf '%s\n' "$ENTRIES" | grep -c '^- ')
          if [ "$COUNT" -gt 8 ]; then
            NAMES=$(printf '%s\n' "$ENTRIES" | sed -E 's/^- (Update|Add|Remove) ([^ :]+).*/\2/' | head -5 | paste -sd ',' - | sed 's/,/, /g')
            ENTRIES="- Update ${COUNT} dependencies (${NAMES}, ...)"
          fi
          {
            echo "$VER"
            echo "$ENTRIES"
            echo
            cat CHANGELOG
          } > CHANGELOG.new
          mv CHANGELOG.new CHANGELOG

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build webroot
        run: |
          cd webui
          npm ci
          npm run build

      - name: Read version + check release
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "${{ inputs.force_release }}" = "true" ]; then
              echo "version_changed=true" >> "$GITHUB_OUTPUT"
              echo "Forcing re-release of existing tag $VERSION"
            else
              echo "version_changed=false" >> "$GITHUB_OUTPUT"
              echo "Release $VERSION already exists; skipping"
            fi
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "New version: $VERSION"
          fi

          CHANGELOG_BLOCK=$(awk -v v="$VERSION" '
            $0==v {found=1; next}
            found && /^v[0-9]/ {exit}
            found {print}
          ' CHANGELOG)
          if [ -z "$(printf '%s' "$CHANGELOG_BLOCK" | tr -d '[:space:]')" ]; then
            CHANGELOG_BLOCK="- Maintenance release: dependency updates"
          fi
          printf '%s\n' "$CHANGELOG_BLOCK" > /tmp/changelog_block.md

      - name: Render release notes from template
        if: steps.setup.outputs.version_changed == 'true'
        run: |
          python3 - <<'PY'
          import os, pathlib
          tpl = pathlib.Path('.github/release-template.md').read_text()
          notes = pathlib.Path('/tmp/changelog_block.md').read_text().rstrip() + '\n'
          out = tpl.replace('{{CHANGELOG}}', notes.rstrip())
          pathlib.Path('/tmp/release_notes.md').write_text(out)
          print(out)
          PY

      - name: Build module zip
        if: steps.setup.outputs.version_changed == 'true'
        run: |
          zip -r9 "${MODULE_NAME}-${VERSION}.zip" \
            module.prop customize.sh promote.sh demote.sh service.sh \
            action.sh uninstall.sh \
            CHANGELOG LICENSE README.md androidacy-config.json \
            META-INF system webroot

      - name: Create GitHub Release
        if: steps.setup.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: "${{ env.MODULE_NAME }}-${{ env.VERSION }}.zip"
          tag_name: "${{ env.VERSION }}"
          name: "microG Installer Revived.... again - ${{ env.VERSION }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false

      - name: Refresh update.json
        if: steps.setup.outputs.version_changed == 'true'
        run: |
          VERSION_CODE=$(grep '^versionCode=' module.prop | cut -d= -f2)
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/${MODULE_NAME}-${VERSION}.zip"
          CHANGELOG_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/CHANGELOG"
          cat > update.json <<EOF
          {
            "version": "${VERSION}",
            "versionCode": ${VERSION_CODE},
            "zipUrl": "${ZIP_URL}",
            "changelog": "${CHANGELOG_URL}"
          }
          EOF

      - name: Commit version bump + update.json
        if: steps.setup.outputs.version_changed == 'true'
        run: |
          if git diff --quiet module.prop update.json CHANGELOG webui/package.json; then
            echo "Nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add module.prop update.json CHANGELOG webui/package.json
          git commit -m "chore: release ${VERSION} [skip ci]"
          for attempt in 1 2 3 4 5; do
            git push origin HEAD:main && exit 0
            echo "push rejected (attempt $attempt); rebasing onto latest main"
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push after retries"
          exit 1

  dispatch:
    needs: release
    if: needs.release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mirror sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          repository: KernelSU-Modules-Repo/microg_installer_revived_again
          event-type: sync-release
          client-payload: '{"version": "${{ needs.release.outputs.VERSION }}"}'
