name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-webui:
    name: Build WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webui

      - name: Build
        run: npm run build
        working-directory: webui

      - name: Test
        run: npm test
        working-directory: webui

      - name: ShellCheck
        run: shellcheck -S warning *.sh || true
